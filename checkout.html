<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/checkout.css">
</head>
<body>

  <div class="checkout-page">
    <div class="checkout-container">

      <!-- COLUMNA IZQUIERDA -->
      <div class="checkout-main">
        <h1>Finalizar compra</h1>
        <p class="checkout-subtitle">Completa tus datos para enviar tu pedido por WhatsApp.</p>

        <form id="checkout-form" class="checkout-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="first_name">Nombre</label>
              <input type="text" id="first_name" required>
            </div>

            <div class="form-group">
              <label for="last_name">Apellido</label>
              <input type="text" id="last_name">
            </div>

            <div class="form-group">
              <label for="phone">Celular</label>
              <input type="text" id="phone" required>
            </div>

            <div class="form-group">
              <label for="email">Correo electrónico</label>
              <input type="email" id="email" required>
            </div>

            <div class="form-group">
              <label for="dni">DNI</label>
              <input type="text" id="dni" required>
            </div>

            <div class="form-group">
              <label for="city">Ciudad</label>
              <input type="text" id="city" required>
            </div>

            <div class="form-group full-width">
              <label for="address">Dirección</label>
              <input type="text" id="address" required>
            </div>

            <div class="form-group full-width">
              <label for="reference">Referencia</label>
              <input type="text" id="reference">
            </div>

            <div class="form-group full-width">
              <label for="notes">Notas adicionales</label>
              <textarea id="notes" rows="4"></textarea>
            </div>
          </div>

          <button type="submit" class="checkout-submit-btn">
            Enviar pedido por WhatsApp
          </button>
        </form>
      </div>

      <!-- COLUMNA DERECHA -->
      <aside class="checkout-sidebar">
        <div class="checkout-summary-card">
          <h2>Resumen de compra</h2>

          <ul class="checkout_list"></ul>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="checkout_subtotal">S/ 0.00</span>
          </div>

          <div class="summary-row">
            <span>Envío</span>
            <span id="checkout_shipping">S/ 0.00</span>
          </div>

          <div class="summary-row total-row">
            <span>Total</span>
            <span id="checkout_total">S/ 0.00</span>
          </div>
        </div>
      </aside>

    </div>
  </div>

  <script src="js/cart.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("checkout-form");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const customer = {
          first_name: document.getElementById("first_name").value,
          last_name: document.getElementById("last_name").value,
          phone: document.getElementById("phone").value,
          email: document.getElementById("email").value,
          dni: document.getElementById("dni").value,
          city: document.getElementById("city").value,
          address: document.getElementById("address").value,
          reference: document.getElementById("reference").value,
          notes: document.getElementById("notes").value
        };

        createOrder(customer);
      });
    });
  </script>

</body>
</html>
